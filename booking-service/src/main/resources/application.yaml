spring:
  application:
    name: booking-service
  r2dbc:
    url: ${DB_URL:r2dbc:postgresql://localhost:5432/bookingdb}
    username: ${DB_USER:booking_user}
    password: ${DB_PASSWORD:booking_pass}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ben.booking: DEBUG